name: E2E

# Runs the Playwright suite against a local Supabase stack + a real `pnpm
# dev` server. Skipped for schema-only PRs, same as ci.yaml — migration
# changes get reviewed via migrations-check.yaml's dry run instead.
on:
  pull_request:
    paths-ignore:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: pnpm/action-setup@v6.0.9

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v2.1.1
        with:
          version: latest
        env:
          SUPABASE_CLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Start local Supabase (applies migrations automatically)
        run: supabase start

      - name: Write .env.local from the local Supabase stack
        run: |
          set -euo pipefail
          json="$(supabase status -o json)"
          {
            echo "VITE_SUPABASE_URL=$(echo "$json" | jq -r '.API_URL')"
            echo "VITE_SUPABASE_ANON_KEY=$(echo "$json" | jq -r '.ANON_KEY')"
            echo "VITE_APP_URL=http://localhost:5173"
            echo "VITE_VAPID_PUBLIC_KEY="
          } > .env.local

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - run: pnpm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
