name: CI

# Type-checks, lints and tests every PR before it can be merged. Skipped
# entirely when a PR only touches DB schema (migrations / config.toml) since
# those changes don't affect app code that lint/test would cover — see
# migrations-check.yaml for the corresponding schema review.
on:
  pull_request:
    paths-ignore:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
  # Also run on merges to main so the README CI badge reflects default-branch
  # health (workflow badges only track runs on the default branch).
  push:
    branches: [main]
    paths-ignore:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'

# Cancel any in-progress run for the same PR or branch when new commits are
# pushed, so we never report a stale (and possibly green) status for outdated
# code.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: pnpm/action-setup@v6.0.9

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run type-check
      - run: pnpm run lint
      - run: pnpm run test
