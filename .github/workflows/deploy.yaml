name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply database migrations
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  build-and-deploy:
    needs: migrate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: pnpm/action-setup@v6.0.9

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run type-check
      - run: pnpm run lint
      - run: pnpm run test

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Supabase Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          for fn in recurring-expenses send-push scan-receipt parse-expense; do
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
          done

      - name: Set Supabase Edge Function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # Edge Function secret names cannot use the reserved SUPABASE_ prefix.
          # SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY are injected automatically
          # by the platform, so we never set them here.
          args=()
          [ -n "${ANTHROPIC_API_KEY:-}" ] && args+=("ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}")
          [ -n "${ANTHROPIC_MODEL:-}" ]   && args+=("ANTHROPIC_MODEL=${ANTHROPIC_MODEL}")
          [ -n "${VAPID_SUBJECT:-}" ]     && args+=("VAPID_SUBJECT=${VAPID_SUBJECT}")
          [ -n "${VAPID_PUBLIC_KEY:-}" ]  && args+=("VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}")
          [ -n "${VAPID_PRIVATE_KEY:-}" ] && args+=("VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}")
          if [ ${#args[@]} -gt 0 ]; then
            supabase secrets set "${args[@]}" --project-ref "$SUPABASE_PROJECT_REF"
          else
            echo "No edge-function secrets configured; skipping (AI autofill / push may be disabled)."
          fi

      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_APP_URL=${{ secrets.VITE_APP_URL }}
            VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      # The k3s API server lives on a private VM behind NAT and is not reachable
      # from a GitHub-hosted runner. Join the tailnet so kubectl can reach it via
      # the VM's Tailscale IP / MagicDNS name (see KUBE_CONFIG note in DEPLOYMENT.md).
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBE_CONFIG_B64" | tr -d '[:space:]' | base64 -d > "$HOME/.kube/config"
          if ! grep -q 'apiVersion' "$HOME/.kube/config"; then
            echo "::error::Decoded KUBE_CONFIG does not look like a kubeconfig. It must be the base64 of your k3s kubeconfig (e.g. 'base64 -w0 k3s.yaml') with 'server:' pointing at the VM's Tailscale IP/MagicDNS name, not 127.0.0.1."
            exit 1
          fi
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Create namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create / refresh cluster Secrets
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL_VALUE: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY_VALUE: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY_VALUE: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          # Image-pull secret so the cluster can pull the private GHCR image.
          # Prefer a dedicated read:packages PAT (GHCR_PULL_TOKEN); the ephemeral
          # GITHUB_TOKEN expires when the job ends, which would break later pulls
          # (e.g. after a node reboot or pod reschedule).
          pull_token="${GHCR_PULL_TOKEN:-$GITHUB_TOKEN}"
          kubectl create secret docker-registry ghcr-creds \
            --namespace twopot \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="$pull_token" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Supabase config as a cluster Secret, provisioned for runtime/server-side
          # use. (The static nginx frontend bakes VITE_* at build time and does not
          # read this at runtime.)
          kubectl create secret generic twopot-supabase \
            --namespace twopot \
            --from-literal=SUPABASE_URL="${SUPABASE_URL_VALUE:-}" \
            --from-literal=SUPABASE_ANON_KEY="${SUPABASE_ANON_KEY_VALUE:-}" \
            --from-literal=SUPABASE_SERVICE_ROLE_KEY="${SUPABASE_SERVICE_ROLE_KEY_VALUE:-}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy manifests
        run: kubectl apply -f k8s/

      - name: Roll out new image
        run: |
          kubectl rollout restart deployment/twopot -n twopot
          kubectl rollout status deployment/twopot -n twopot --timeout=180s
