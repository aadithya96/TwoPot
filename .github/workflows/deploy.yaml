name: Deploy

on:
  push:
    branches: [main]
env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 20

      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm run test

      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
        
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME  }}:latest
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_APP_URL=${{ secrets.VITE_APP_URL }}
            VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBE_CONFIG_B64" | tr -d '[:space:]' | base64 -d > "$HOME/.kube/config"
          if ! grep -q 'apiVersion' "$HOME/.kube/config"; then
            echo "::error::Decoded KUBE_CONFIG does not look like a kubeconfig. Ensure the secret is the base64 of k3s.yaml (e.g. 'base64 -w0 k3s.yaml')."
            exit 1
          fi
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - run: kubectl apply -f k8s/
      - run: kubectl rollout restart deployment/twopot -n twopot
