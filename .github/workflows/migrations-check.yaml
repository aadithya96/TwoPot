name: Migrations check

# On every PR that touches the database migrations, show which migrations
# would be applied to production WITHOUT actually running them. Acts as a
# guardrail so unexpected schema changes are reviewed before merge.
on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/migrations-check.yaml'

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: supabase/setup-cli@v2.1.1
        with:
          # Pin an explicit version rather than `latest`, whose release lookup
          # is an unauthenticated GitHub API call that gets rate-limited on CI.
          version: 2.108.0

      - name: Show pending migrations (dry run)
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push --dry-run
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
